# Simple CI: install the package and smoke-test import + CLI across Python versions.
# Add a `pytest` step once a tests/ suite exists.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev extras)
        run: pip install -e '.[dev]'

      - name: Smoke test
        run: |
          python -c "import dropitx, dropitx.cli, dropitx.uploader, dropitx.config, dropitx.qr"
          dropitx --version
          dropitx --help
