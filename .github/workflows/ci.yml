# Simple CI: install package, run pytest, and smoke-test the CLI across Python versions.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev + qr extras)
        run: pip install -e '.[dev,qr]'

      - name: Run tests
        run: pytest -q

      - name: CLI smoke test
        run: |
          dropitx --version
          dropitx --help
